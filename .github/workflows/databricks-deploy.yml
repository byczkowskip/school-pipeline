name: Deploy to Databricks (Asset Bundle)

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Bundle (na każdym PR i push)
        run: databricks bundle validate --target dev

      - name: Deploy to Databricks DEV
        if: github.ref == 'refs/heads/main'        # deploy tylko na branch main
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy --target dev

      # Opcjonalnie: uruchomienie joba po deployu (odkomentuj jeśli chcesz)
