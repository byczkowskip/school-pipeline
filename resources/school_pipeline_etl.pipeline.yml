# The main pipeline for school_pipeline

resources:
  pipelines:
    school_pipeline_etl:
      name: school_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/school_pipeline_etl"

      libraries:
        - glob:
            include: ../src/school_pipeline_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
